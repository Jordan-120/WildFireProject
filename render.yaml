services:
  - type: web
    name: wildfire-django-dashboard
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn wildfire_site.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: wildfire-django-dashboard.onrender.com
